name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # necessário para OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/385463161787/locations/global/workloadIdentityPools/gh-pool/providers/ghmarlon
          service_account: ghactions-sa@project-ece362c5-3760-4417-888.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy bia-backend \
            --source backend \
            --region us-central1 \
            --allow-unauthenticated
          
          